<!doctype html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MGMBETMYR Marketing OS</title><link rel="stylesheet" href="/styles.css"></head>
<body><aside><h1>MGMBETMYR</h1><p>Marketing OS V4 Pro</p><nav><button data-view="dashboard">总览</button><button data-view="content">内容中心</button><button data-view="generator">AI 内容工厂</button></nav></aside>
<main><section id="dashboard" class="view"><header><h2>营销总览</h2><button onclick="loadDashboard()">刷新</button></header><div id="cards" class="cards"></div><div class="panel"><h3>最近内容</h3><div id="recent"></div></div></section>
<section id="content" class="view hidden"><header><h2>内容中心</h2></header><div class="panel"><table><thead><tr><th>标题</th><th>平台</th><th>状态</th><th>AI评分</th><th>操作</th></tr></thead><tbody id="contentRows"></tbody></table></div></section>
<section id="generator" class="view hidden"><header><h2>AI 内容工厂</h2></header><div class="panel form"><label>主题<input id="topic" placeholder="例如：马来西亚人才懂的理发店尴尬"></label><label>平台<select id="platform"><option>Facebook</option><option>Instagram</option><option>TikTok</option><option>Telegram</option></select></label><button onclick="generate()">生成内容草稿</button><pre id="result">等待生成...</pre></div></section></main><script src="/app.js"></script></body></html>
